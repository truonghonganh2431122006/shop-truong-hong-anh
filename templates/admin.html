<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    const token = localStorage.getItem("access_token");

    async function checkAuth() {
      if (!token) {
        window.location.href = "/login";
        return;
      }
      try {
        const res = await fetch("/me", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        if (data.role.toUpperCase() !== "ADMIN") {
          window.location.href = "/shop";
        }
      } catch (err) {
        window.location.href = "/login";
      }
    }
    checkAuth();
  </script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #f3f4f6; }
    header { background: #111827; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .status-active { color: green; font-weight: bold; }
    .status-banned { color: red; font-weight: bold; }
    .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; margin-right: 5px; font-weight: bold; }
    .btn-ban { background: #f59e0b; color: white; }
    .btn-unban { background: #10b981; color: white; }
    .btn-delete { background: #ef4444; color: white; }
    .logout { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

    /* CSS Thêm mới cho phần Đơn hàng */
    .btn-ship { background: #3b82f6; color: white; }
    .btn-done { background: #10b981; color: white; }
    .order-status { font-weight: bold; text-transform: uppercase; font-size: 12px; }
    .status-cho { color: #d97706; }
    .status-giao { color: #2563eb; }
    .status-xong { color: #059669; }
  </style>
</head>

<body>
  <header>
    <h1>Admin Control Panel</h1>
    <button class="logout" onclick="logout()">Đăng xuất</button>
  </header>

  <div class="container">
    <div class="card">
      <h2>Quản lý người dùng</h2>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Quyền</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Danh sách đơn đặt hàng</h2>
      <table>
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Email khách</th> <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="orderTableBody">
          </tbody>
      </table>
    </div>
  </div>

  <script>
    // --- CÁC HÀM CŨ CỦA BẠN (GIỮ NGUYÊN) ---
    async function loadUsers() {
      try {
        const res = await fetch("/admin/users", { headers: { "Authorization": "Bearer " + token } });
        const users = await res.json();
        const tbody = document.getElementById("userTable");
        tbody.innerHTML = "";
        users.forEach(u => {
          const row = `<tr>
              <td>${u.email}</td>
              <td>${u.role}</td>
              <td class="${u.status === 'BANNED' ? 'status-banned' : 'status-active'}">${u.status}</td>
              <td>
                ${u.status === 'ACTIVE'
                  ? `<button class="btn btn-ban" onclick="updateStatus('${u.email}', 'BANNED')">Khóa</button>`
                  : `<button class="btn btn-unban" onclick="updateStatus('${u.email}', 'ACTIVE')">Mở khóa</button>`
                }
                <button class="btn btn-delete" onclick="deleteUser('${u.email}')">Xóa</button>
              </td>
            </tr>`;
          tbody.innerHTML += row;
        });
      } catch (err) { console.error("Lỗi tải danh sách user:", err); }
    }

    async function updateStatus(email, status) {
      const path = status === 'BANNED' ? '/admin/ban' : '/admin/unban';
      await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ email })
      });
      loadUsers();
    }

    async function deleteUser(email) {
      if (!confirm(`Bạn có chắc muốn xóa tài khoản ${email}?`)) return;
      await fetch("/admin/delete", {
        method: "DELETE",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ email: email })
      });
      loadUsers();
    }

        // --- CÁC HÀM QUẢN LÝ ĐƠN HÀNG (THÊM MỚI) ---
        // 1. Hàm lấy đơn hàng từ Server (Python)
    async function loadOrders() {
      const tbody = document.getElementById('orderTableBody');
      if (!tbody) return; // Bảo vệ nếu không tìm thấy thẻ

      tbody.innerHTML = '<tr><td colspan="6">Đang tải đơn hàng từ hệ thống...</td></tr>';

      try {
        const res = await fetch('/admin/orders', {
          headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('access_token')
          }
        });

        if (!res.ok) throw new Error("Lỗi xác thực hoặc Server có vấn đề");

        const orders = await res.json();
        tbody.innerHTML = ''; 

        if (orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6">Chưa có đơn hàng nào trong hệ thống.</td></tr>';
          return;
        }

        orders.forEach(ord => {
          let sClass = "status-cho";
          if (ord.status === "Đang giao") sClass = "status-giao";
          if (ord.status === "Đã giao") sClass = "status-xong";

          const row = `
            <tr>
              <td><b>#${ord.id}</b></td>
              <td>${ord.email}</td>
              <td>${ord.created_at}</td>
              <td><span style="color:red; font-weight:bold">${ord.total.toLocaleString()}đ</span></td>
              <td><span class="order-status ${sClass}">${ord.status || 'Chờ xác nhận'}</span></td>
              <td>
                <button class="btn btn-ship" onclick="updateOrderStatus('${ord.id}', 'Đang giao')">Giao</button>
                <button class="btn btn-done" onclick="updateOrderStatus('${ord.id}', 'Đã giao')">Xong</button>
              </td>
            </tr>
          `;
          tbody.innerHTML += row;
        });
      } catch (err) {
        console.error("Lỗi load đơn:", err);
        tbody.innerHTML = '<tr><td colspan="6" style="color:red">Không thể kết nối Server. Vui lòng đăng nhập lại Admin!</td></tr>';
      }
    }

    // 2. Hàm cập nhật trạng thái (Cũng phải gửi lên Server)
    async function updateOrderStatus(orderId, newStatus) {
        // Tạm thời báo cho bạn biết, hàm này cần viết thêm API ở Python để đổi trạng thái trong DB
        alert("Chức năng đổi trạng thái đơn " + orderId + " sang " + newStatus + " cần thêm API ở Python mới lưu vĩnh viễn được!");
    }

    // Chạy hàm load ngay khi vào trang
    window.onload = loadOrders;

    function logout() {
      localStorage.clear();
      window.location.href = "/login";
    }

    // Gọi tải dữ liệu khi trang web load
    loadUsers();
    loadOrders();
  </script>
</body>

</html>
