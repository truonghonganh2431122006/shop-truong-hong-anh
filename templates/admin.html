<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard - Shop Hồng Anh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; font-family: sans-serif; background: #f3f4f6; }
    header { background: #111827; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
    h2 { margin-top: 0; color: #111827; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; color: #4b5563; text-transform: uppercase; font-size: 12px; }
    .order-status { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .status-cho { background: #fef3c7; color: #92400e; }
    .status-giao { background: #dbeafe; color: #1e40af; }
    .status-xong { background: #d1fae5; color: #065f46; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 5px; }
    .btn-ship { background: #3b82f6; color: white; }
    .btn-done { background: #10b981; color: white; }
    .btn-logout { background: #ef4444; color: white; }
    .nav-tabs { margin-bottom: 20px; }
    .nav-tabs button { padding: 10px 25px; cursor: pointer; border: none; background: #e5e7eb; margin-right: 8px; border-radius: 6px; font-weight: bold; transition: 0.3s; }
    .nav-tabs button.active { background: #111827; color: white; }
  </style>
</head>
<body>

  <header>
    <h1>Hồng Anh Admin Dashboard</h1>
    <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
  </header>

  <div class="container">
    <div class="nav-tabs">
        <button id="btn-orders" class="active" onclick="showTab('orders')">📦 Đơn hàng</button>
        <button id="btn-products" onclick="showTab('products')">🛍️ Sản phẩm</button>
        <button id="btn-users" onclick="showTab('users')">👥 Tài khoản</button>
    </div>

    <div id="tab-orders" class="card">
      <h2>Danh sách đơn đặt hàng</h2>
      <table>
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Email khách</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="orderTableBody">
          <tr><td colspan="6">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="tab-products" class="card" style="display:none;">
      <h2>Quản lý sản phẩm</h2>
      <button class="btn btn-ship" onclick="alert('Chức năng thêm sản phẩm sẽ sớm cập nhật')">+ Thêm sản phẩm mới</button>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="productTableBody">
          <tr><td colspan="4">Chức năng đang cập nhật...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="tab-users" class="card" style="display:none;">
      <h2>Quản lý người dùng</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Vai trò</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr><td colspan="4">Đang tải danh sách thành viên...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("access_token");

    // 1. Kiểm tra đăng nhập
    async function checkAuth() {
      if (!token) { window.location.href = "/login"; return; }
      try {
        const res = await fetch("/me", { headers: { "Authorization": "Bearer " + token } });
        const data = await res.json();
        if (data.role.toUpperCase() !== "ADMIN") { window.location.href = "/shop"; }
      } catch (err) { window.location.href = "/login"; }
    }

    // 2. Hàm chuyển Tab
    function showTab(tabName) {
        // Ẩn tất cả tabs
        document.getElementById('tab-orders').style.display = 'none';
        document.getElementById('tab-products').style.display = 'none';
        document.getElementById('tab-users').style.display = 'none';
        
        // Bỏ active tất cả nút
        document.getElementById('btn-orders').classList.remove('active');
        document.getElementById('btn-products').classList.remove('active');
        document.getElementById('btn-users').classList.remove('active');

        // Hiện tab được chọn
        document.getElementById('tab-' + tabName).style.display = 'block';
        document.getElementById('btn-' + tabName).classList.add('active');

        // Gọi hàm load dữ liệu tương ứng
        if(tabName === 'orders') loadOrders();
        if(tabName === 'users') loadUsers();
    }

    // Cập nhật bảng User với nút Ban/Unban
    async function loadUsers() {
      const tbody = document.getElementById('userTableBody');
      try {
        const res = await fetch('/users', { headers: { 'Authorization': 'Bearer ' + token } });
        const users = await res.json();
        tbody.innerHTML = '';

        users.forEach(u => {
          // Nếu là chính mình thì ẩn nút, hoặc làm mờ nút
          const isMe = u.email === localStorage.getItem("user_email"); // Bạn nên lưu email lúc login
          const btnBanText = u.is_active ? "Khóa (Ban)" : "Mở khóa (Unban)";
          const btnBanClass = u.is_active ? "btn-logout" : "btn-done";

          tbody.innerHTML += `
            <tr>
              <td>${u.id}</td>
              <td>${u.email} ${isMe ? '<i style="color:gray">(Bạn)</i>' : ''}</td>
              <td><b>${u.role}</b></td>
              <td>
                ${!isMe && u.role !== 'ADMIN' ? `
                  <button class="btn ${btnBanClass}" onclick="toggleBan(${u.id})">${btnBanText}</button>
                  <button class="btn" style="background:gray; color:white" onclick="deleteUser(${u.id})">Xóa</button>
                ` : '<span style="color:gray">Hệ thống</span>'}
              </td>
            </tr>`;
        });
      } catch (err) { console.error(err); }
    }

    // Hàm gọi API khóa/mở khóa
    async function toggleBan(userId) {
        if(!confirm("Bạn có chắc muốn thay đổi trạng thái tài khoản này?")) return;
        try {
            const res = await fetch(`/users/${userId}/toggle-active`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if(res.ok) {
                alert(data.message);
                loadUsers(); // Load lại bảng
            } else {
                alert(data.detail);
            }
        } catch (err) { alert("Lỗi kết nối!"); }
    }

    // 4. Load Tài khoản (Dành cho Tab User)
    async function loadUsers() {
      const tbody = document.getElementById('userTableBody');
      try {
        const res = await fetch('/users', { // Giả sử bạn có route /users ở main.py
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const users = await res.json();
        tbody.innerHTML = '';
        users.forEach(u => {
          tbody.innerHTML += `
            <tr>
              <td>${u.id}</td>
              <td>${u.email}</td>
              <td><b>${u.role}</b></td>
              <td><button class="btn btn-logout" onclick="alert('Khóa tài khoản ${u.email}')">Khóa</button></td>
            </tr>`;
        });
      } catch (err) { tbody.innerHTML = '<tr><td colspan="4">Không thể tải danh sách (Cần API /users ở Python).</td></tr>'; }
    }

    async function updateStatus(id, status) {
        alert("Đang cập nhật đơn #" + id + " thành " + status);
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/login";
    }

    // Chạy mặc định
    checkAuth();
    loadOrders();
  </script>
</body>
</html>
