  <!DOCTYPE html>
  <html lang="vi">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản - ShopOnline</title>
  <style>
  /* ========== CSS VARIABLES ========== */
  :root {
    --bg: #f8f8f8;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #64748b;
    --input-bg: #ffffff;
    --input-border: #e2e8f0;
    --primary: #f97316;
    --primary-dark: #ea580c;
    --error: #ef4444;
    --shadow: 0 25px 60px rgba(0,0,0,0.12);
    --glow: 0 0 0 3px rgba(249,115,22,0.25);
  }
  .dark {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --input-bg: #334155;
    --input-border: #475569;
    --shadow: 0 25px 60px rgba(0,0,0,0.4);
  }

  /* ========== RESET & BASE ========== */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }

  /* ========== ANIMATED GRADIENT BG ========== */
  .gradient-bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #f97316, #a855f7, #3b82f6, #06b6d4, #f97316);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating orbs */
  .orb {
    position: fixed; border-radius: 50%; opacity: 0.12; z-index: 0;
    animation: floatOrb 8s ease-in-out infinite;
  }
  .orb:nth-child(1) { width:300px;height:300px;top:-80px;left:-80px;background:#f97316;animation-delay:0s; }
  .orb:nth-child(2) { width:200px;height:200px;bottom:10%;right:5%;background:#a855f7;animation-delay:2s; }
  .orb:nth-child(3) { width:250px;height:250px;top:40%;left:30%;background:#3b82f6;animation-delay:4s; }
  .orb:nth-child(4) { width:180px;height:180px;bottom:-60px;left:10%;background:#06b6d4;animation-delay:6s; }
  @keyframes floatOrb {
    0%,100% { transform: translateY(0) scale(1); }
    50%     { transform: translateY(-30px) scale(1.05); }
  }

  /* ========== LAYOUT ========== */
  .container {
    position: relative; z-index: 1;
    display: flex; min-height: 100vh;
  }

  /* ========== LEFT BANNER ========== */
  .banner {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem; color: #fff; position: relative; overflow: hidden;
  }
  .banner::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.15);
  }
  .banner-content { position: relative; z-index: 1; text-align: center; }
  .banner-logo { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; display:flex;align-items:center;justify-content:center;gap:12px; }
  .banner-logo span { font-size: 2.8rem; }
  .banner-subtitle { font-size: 1.1rem; opacity: 0.9; max-width: 380px; line-height: 1.6; margin-bottom: 2rem; }
  .banner-illustration {
    width: 320px; height: 320px; border-radius: 24px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* ========== RIGHT FORM ========== */
  .form-section {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 2rem; background: var(--bg);
    transition: background 0.3s;
  }
  .form-card {
    width: 100%; max-width: 440px;
    background: var(--card-bg);
    border-radius: 20px; padding: 2.5rem;
    box-shadow: var(--shadow);
    animation: fadeInUp 0.7s ease-out;
    transition: background 0.3s, box-shadow 0.3s;
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Dark mode toggle */
  .dark-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 99;
    width: 48px; height: 48px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 1.4rem;
    background: var(--card-bg); color: var(--text);
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: all 0.3s;
  }
  .dark-toggle:hover { transform: scale(1.1); }

  /* Mobile logo */
  .mobile-logo {
    display: none; text-align: center; margin-bottom: 1.5rem;
    font-size: 1.5rem; font-weight: 800; color: var(--primary);
  }
  .mobile-logo span { font-size: 1.8rem; }

  /* Form title */
  .form-title { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .form-desc { text-align: center; color: var(--text-secondary); margin-bottom: 1.75rem; font-size: 0.95rem; }

  /* Input groups */
  .input-group { margin-bottom: 1.25rem; }
  .input-group label { display:block; font-size:0.875rem; font-weight:600; margin-bottom:6px; }
  .input-wrapper {
    position: relative; display: flex; align-items: center;
  }
  .input-icon {
    position: absolute; left: 14px; font-size: 1.1rem;
    color: var(--text-secondary); pointer-events: none;
  }
  .input-wrapper input {
    width: 100%; padding: 14px 48px 14px 44px;
    border: 2px solid var(--input-border);
    border-radius: 12px; font-size: 0.95rem;
    background: var(--input-bg); color: var(--text);
    outline: none; transition: all 0.25s;
  }
  .input-wrapper input::placeholder { color: var(--text-secondary); }
  .input-wrapper input:focus {
    border-color: var(--primary);
    box-shadow: var(--glow);
  }
  .input-wrapper input.error { border-color: var(--error); }
  .input-wrapper input.error:focus { box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }

  .toggle-pass {
    position: absolute; right: 14px; background: none;
    border: none; cursor: pointer; font-size: 1.2rem;
    color: var(--text-secondary); transition: color 0.2s;
  }
  .toggle-pass:hover { color: var(--text); }

  .error-msg {
    color: var(--error); font-size: 0.8rem; margin-top: 5px;
    display: flex; align-items: center; gap: 4px;
    animation: shakeIn 0.3s ease;
  }
  @keyframes shakeIn {
    0%,100% { transform:translateX(0); }
    25%     { transform:translateX(-5px); }
    75%     { transform:translateX(5px); }
  }

  /* Submit button */
  .btn-submit {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer;
    background: linear-gradient(135deg, #f97316, #ea580c);
    transition: all 0.3s; display: flex; align-items: center;
    justify-content: center; gap: 8px; margin-top: 0.5rem;
  }
  .btn-submit:hover:not(:disabled) {
    background: linear-gradient(135deg, #ea580c, #c2410c);
    box-shadow: 0 8px 25px rgba(249,115,22,0.4);
    transform: translateY(-2px);
  }
  .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

  /* Spinner */
  .spinner {
    width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Links */
  .form-footer {
    text-align: center; margin-top: 1.5rem;
    color: var(--text-secondary); font-size: 0.9rem;
  }
  .form-footer a {
    color: var(--primary); text-decoration: none; font-weight: 600;
  }
  .form-footer a:hover { text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
    padding: 14px 28px; border-radius: 12px; font-weight: 600;
    color: #fff; z-index: 999; transition: transform 0.4s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
  .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 900px) {
    .banner { display: none; }
    .form-section { padding: 1.5rem; }
    .mobile-logo { display: block; }
  }
  </style>
  </head>
  <body>
  <!-- Animated background -->
  <div class="gradient-bg"></div>
  <div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div>

  <!-- Dark mode toggle -->
  <button class="dark-toggle" onclick="toggleDark()" title="Chuyển chế độ sáng/tối">🌙</button>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <div class="container">
    <!-- Left Banner -->
    <div class="banner">
      <div class="banner-content">
        <div class="banner-logo"><span>🛒</span> ShopOnline</div>
        <p class="banner-subtitle">Tạo tài khoản để khám phá hàng triệu sản phẩm chính hãng với ưu đãi hấp dẫn mỗi ngày!</p>
        <div class="banner-illustration">🛍️</div>
      </div>
    </div>

    <!-- Right Form -->
    <div class="form-section">
      <div class="form-card">
        <!-- Mobile logo -->
        <div class="mobile-logo"><span>🛒</span> ShopOnline</div>

        <h2 class="form-title">Tạo tài khoản</h2>
        <p class="form-desc">Đăng ký để bắt đầu mua sắm!</p>

        <form id="registerForm" novalidate>
          <!-- Email -->
          <div class="input-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email" id="email" placeholder="Nhập email" autocomplete="email">
            </div>
            <div class="error-msg" id="emailError" style="display:none"></div>
          </div>

          <!-- Password -->
          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
              <button type="button" class="toggle-pass" onclick="togglePassword('password', this)">👁</button>
            </div>
            <div class="error-msg" id="passwordError" style="display:none"></div>
          </div>

          <!-- Confirm Password -->
          <div class="input-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu">
              <button type="button" class="toggle-pass" onclick="togglePassword('confirmPassword', this)">👁</button>
            </div>
            <div class="error-msg" id="confirmError" style="display:none"></div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit" id="submitBtn">Đăng ký</button>
        </form>

        <div class="form-footer">
          Đã có tài khoản? <a href="/login">Đăng nhập</a>
        </div>
      </div>
    </div>
  </div>

<script>
/* ========== CÁC BIẾN GIAO DIỆN ========== */
const registerForm = document.getElementById('registerForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('confirmPassword');
const submitBtn = document.getElementById('submitBtn');
const toast = document.getElementById('toast');

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

/* ========== DARK MODE & TOGGLE PASS (Giữ nguyên tính năng đẹp của bạn) ========== */
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  const btn = document.querySelector('.dark-toggle');
  btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.textContent = isPassword ? '🙈' : '👁';
}

/* ========== HIỂN THỊ LỖI TRÊN TỪNG Ô NHẬP ========== */
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '⚠ ' + msg;
  el.style.display = 'flex';
  const input = document.getElementById(id.replace('Error', '').replace('confirm', 'confirmPassword'));
  if(input) input.classList.add('error');
}

function clearError(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
  const input = document.getElementById(id.replace('Error', '').replace('confirm', 'confirmPassword'));
  if(input) input.classList.remove('error');
}

/* ========== THÔNG BÁO TOAST XỊN ========== */
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ========== XỬ LÝ ĐĂNG KÝ KẾT NỐI SERVER ========== */
registerForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  // 1. Lấy dữ liệu
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const confirm = confirmInput.value;

  // 2. Kiểm tra nhanh (Validation)
  let hasError = false;
  if (!email || !emailRegex.test(email)) { showError('emailError', 'Email không hợp lệ'); hasError = true; } else { clearError('emailError'); }
  if (password.length < 6) { showError('passwordError', 'Mật khẩu tối thiểu 6 ký tự'); hasError = true; } else { clearError('passwordError'); }
  if (confirm !== password) { showError('confirmError', 'Mật khẩu xác nhận không khớp'); hasError = true; } else { clearError('confirmError'); }

  if (hasError) return;

  // 3. Trạng thái Loading
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner"></div> Đang tạo tài khoản...';

  try {
    // 4. Gửi yêu cầu đến Server Python
    // Lưu ý: Đường dẫn /auth/register phải khớp với main.py của bạn
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      // THÀNH CÔNG
      showToast('🎉 Đăng ký thành công! Đang chuyển hướng đăng nhập...', 'success');
      
      // Chuyển hướng sang trang đăng nhập sau 2 giây
      setTimeout(() => {
        window.location.href = "/login";
      }, 2000);

    } else {
      // THẤT BẠI (Ví dụ: Email đã tồn tại)
      showToast('❌ ' + (data.detail || 'Đăng ký thất bại, thử lại sau'), 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Đăng ký';
    }

  } catch (err) {
    // LỖI KẾT NỐI
    showToast('❌ Không thể kết nối đến máy chủ!', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Đăng ký';
  }
});

/* ========== XÓA LỖI KHI ĐANG GÕ ========== */
[emailInput, passwordInput, confirmInput].forEach(input => {
    input.addEventListener('input', () => {
        const errorId = input.id === 'confirmPassword' ? 'confirmError' : input.id + 'Error';
        clearError(errorId);
    });
});
</script>
  </body>
  </html>
